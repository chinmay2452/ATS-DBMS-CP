<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-layer-group"></i>
                <span>ATS Pro</span>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-target="dashboard">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-target="jobs">
                    <i class="fas fa-briefcase"></i>
                    <span>Jobs</span>
                </a>
                <a href="#" class="nav-item" data-target="applicants">
                    <i class="fas fa-users"></i>
                    <span>Applicants</span>
                </a>
                <a href="#" class="nav-item" data-target="applications">
                    <i class="fas fa-file-alt"></i>
                    <span>Applications</span>
                </a>
                <a href="#" class="nav-item" data-target="interviews">
                    <i class="fas fa-calendar-alt"></i>
                    <span>Interviews</span>
                </a>
                <a href="#" class="nav-item" data-target="offers">
                    <i class="fas fa-file-invoice-dollar"></i>
                    <span>Offers</span>
                </a>
                <a href="#" class="nav-item" data-target="reports">
                    <i class="fas fa-chart-pie"></i>
                    <span>Reports</span>
                </a>
            </nav>
            <div class="user-profile">
                <div class="avatar">RM</div>
                <div class="user-info">
                    <span class="user-name">Rahul Mehta</span>
                    <span class="user-role">Recruiter</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <h1 id="page-title">Dashboard</h1>
                <div class="header-actions">
                    <div class="search-bar">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Search...">
                    </div>
                    <button class="icon-btn"><i class="fas fa-bell"></i></button>
                    <button class="btn-primary" id="add-btn"><i class="fas fa-plus"></i> New Job</button>
                </div>
            </header>

            <div class="content-area" id="content-area">
                <!-- Content will be dynamically loaded here by app.js -->
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Details</h2>
                <button class="close-btn" id="close-modal"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Dynamic content -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
